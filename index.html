<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Cá Nhân</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #4facfe;
}

h1{
    margin-top:15px;
    color:#333;
}

.role{
    color:#666;
    margin:10px 0;
}

.bio{
    color:#555;
    margin:15px 0;
    line-height:1.5;
}

.social{
    margin-top:20px;
}

.social a{
    text-decoration:none;
    color:white;
    background:#4facfe;
    padding:10px 15px;
    margin:5px;
    border-radius:10px;
    display:inline-block;
    transition:0.3s;
}

.social a:hover{
    background:#007bff;
}
</style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/120" alt="Avatar" class="avatar">

    <h1>Minh Phát</h1>
    <p class="role">Học sinh • Gamer</p>

    <p class="bio">
        Xin chào! Mình là Minh Phát.
        Mình thích chơi game, công nghệ và học hỏi những điều mới.
    </p>

    <div class="social">
        <a href="#">Facebook</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
    </div>
</div>

</body>
</html>
